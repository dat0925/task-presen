<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPRESS DESIGN AI リリースタスク</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --ink2: #2d2d4e;
    --mist: #f0f2f8;
    --border: #d4d8ee;
    --accent: #4f46e5;
    --accent2: #7c3aed;
    --done: #059669;
    --warn: #d97706;
    --danger: #dc2626;
    --text: #374151;
    --sub: #6b7280;
    --white: #ffffff;
    --card: #ffffff;
    --shadow: 0 1px 4px rgba(79,70,229,0.08);
    --radius: 6px;
    --header-h: 48px;
    --adder-h: 58px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e8eaf6;
    color: var(--text);
    min-height: 100vh;
    padding-top: calc(var(--header-h) + 16px);
    padding-bottom: calc(var(--adder-h) + 16px);
  }

  /* ===== PRINT ===== */
  @media print {
    @page { size: A4 landscape; margin: 10mm; }
    body { background: white; padding: 0; }
    .no-print { display: none !important; }
    .task-card { break-inside: avoid; }
    .subtask-list { display: flex !important; }
    .dash-header { position: static !important; box-shadow: none; }
    .add-task-fixed { display: none !important; }
  }

  /* ===== HEADER (sticky top) ===== */
  .dash-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(135deg, var(--ink) 0%, var(--ink2) 60%, #3730a3 100%);
    color: white;
    height: var(--header-h);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(99,102,241,0.5);
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .header-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  /* Progress block – half height */
  .overall-progress-block {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 4px 12px;
  }
  .overall-pct {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    line-height: 1;
  }
  .overall-pct span { font-size: 11px; opacity: 0.7; }
  .overall-bar-wrap {
    width: 100px;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 3px;
  }
  .overall-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #818cf8, #a78bfa);
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .overall-label { font-size: 8px; opacity: 0.6; letter-spacing: 0.08em; margin-top: 2px; }

  .stat-pills { display: flex; gap: 6px; }
  .stat-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 3px 8px;
    font-size: 9px;
    display: flex; align-items: center; gap: 4px;
  }
  .stat-pill .dot { width: 5px; height: 5px; border-radius: 50%; }
  .stat-pill .num { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 11px; }

  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .header-date {
    font-size: 9px; opacity: 0.5;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }
  .hdr-btn {
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 10px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    border: none;
    transition: background 0.2s;
  }
  .hdr-btn.print {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
  }
  .hdr-btn.print:hover { background: rgba(255,255,255,0.25); }
  .hdr-btn.reset {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.65);
  }
  .hdr-btn.reset:hover { background: rgba(220,38,38,0.25); color: white; }

  /* ===== MAIN ===== */
  .main-content {
    max-width: 800px;
    margin: 0 auto;
    padding: 16px 20px;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--sub);
    font-size: 13px;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
    animation: slideUp 0.2s ease;
  }
  .task-card:hover { box-shadow: 0 3px 12px rgba(79,70,229,0.12); }
  .task-card.done { border-left: 3px solid var(--done); opacity: 0.72; }

  .task-main {
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .cb-wrap { flex-shrink: 0; margin-top: 2px; }
  .cb-wrap input[type="checkbox"] { display: none; }
  .cb-label {
    display: flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
  }
  .cb-wrap input:checked + .cb-label { background: var(--done); border-color: var(--done); }
  .cb-wrap input:checked + .cb-label::after {
    content: '✓'; color: white; font-size: 10px; font-weight: 700; line-height: 1;
  }

  .task-info { flex: 1; min-width: 0; }
  .task-name {
    font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.4; word-break: break-all;
  }
  .task-name.done-text { text-decoration: line-through; color: var(--sub); }

  .task-meta {
    display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap;
  }
  .check-date {
    font-size: 9px; font-family: 'DM Mono', monospace; color: var(--done);
    background: #ecfdf5; padding: 1px 5px; border-radius: 3px;
  }
  .priority-badge {
    font-size: 8px; font-weight: 700; letter-spacing: 0.05em;
    padding: 1px 5px; border-radius: 3px; text-transform: uppercase;
  }
  .p-high { background: #fee2e2; color: var(--danger); }
  .p-mid  { background: #fef3c7; color: var(--warn); }
  .p-low  { background: #e0f2fe; color: #0369a1; }

  .task-actions { display: flex; align-items: center; flex-shrink: 0; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #d1d5db; font-size: 12px; padding: 2px 4px;
    border-radius: 3px; opacity: 0; transition: opacity 0.2s, color 0.2s;
  }
  .task-card:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--danger); }

  .task-progress-mini { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
  .mini-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
  .mini-pct { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--sub); min-width: 26px; text-align: right; }

  .toggle-sub {
    background: none; border: none; cursor: pointer; color: var(--sub);
    font-size: 10px; padding: 2px 4px; border-radius: 3px;
    display: flex; align-items: center; gap: 3px;
    transition: background 0.15s; white-space: nowrap;
  }
  .toggle-sub:hover { background: var(--mist); }
  .toggle-sub .arrow { transition: transform 0.2s; display: inline-block; font-size: 8px; }
  .toggle-sub.open .arrow { transform: rotate(90deg); }

  /* ===== SUBTASKS ===== */
  .subtask-list {
    border-top: 1px solid var(--border);
    background: #f9fafb;
    padding: 6px 8px;
    display: none; flex-direction: column; gap: 4px;
  }
  .subtask-list.open { display: flex; }

  .subtask-item {
    display: flex; align-items: center; gap: 7px;
    padding: 3px 4px; border-radius: 4px; transition: background 0.15s;
  }
  .subtask-item:hover { background: var(--mist); }
  .subtask-item .cb-label { width: 13px; height: 13px; border-radius: 3px; }
  .subtask-item .cb-wrap input:checked + .cb-label::after { font-size: 8px; }
  .subtask-name { font-size: 11px; color: var(--text); flex: 1; min-width: 0; word-break: break-all; }
  .subtask-name.done-text { text-decoration: line-through; color: var(--sub); }
  .sub-date { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--done); white-space: nowrap; }
  .sub-del {
    background: none; border: none; cursor: pointer;
    color: #d1d5db; font-size: 10px; opacity: 0; transition: opacity 0.15s; padding: 2px;
  }
  .subtask-item:hover .sub-del { opacity: 1; }
  .sub-del:hover { color: var(--danger); }

  .add-sub-form { display: flex; gap: 4px; margin-top: 4px; }
  .add-sub-input {
    flex: 1; font-size: 10px; padding: 3px 6px;
    border: 1px solid var(--border); border-radius: 4px;
    outline: none; font-family: 'Noto Sans JP', sans-serif; background: white;
  }
  .add-sub-input:focus { border-color: var(--accent); }
  .add-sub-btn {
    background: var(--accent); color: white; border: none; border-radius: 4px;
    font-size: 10px; padding: 3px 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }

  /* ===== FIXED BOTTOM ADD TASK BAR ===== */
  .add-task-fixed {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: white;
    border-top: 1px solid var(--border);
    box-shadow: 0 -2px 12px rgba(79,70,229,0.1);
    padding: 10px 20px;
    height: var(--adder-h);
  }
  .add-task-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .add-task-input {
    flex: 1; font-size: 12px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 4px;
    outline: none; font-family: 'Noto Sans JP', sans-serif; background: white;
  }
  .add-task-input:focus { border-color: var(--accent); }
  .add-task-priority {
    font-size: 11px; padding: 7px 8px;
    border: 1px solid var(--border); border-radius: 4px;
    background: white; cursor: pointer; outline: none;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .add-task-btn {
    background: var(--accent); color: white; border: none; border-radius: 4px;
    font-size: 12px; padding: 7px 14px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 500; white-space: nowrap;
  }
  .add-task-btn:hover { background: #4338ca; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Sticky Header -->
<div class="dash-header">
  <div class="header-left">
    <div class="logo-mark">E</div>
    <div class="header-title">EPRESS DESIGN AI リリースタスク</div>
  </div>

  <div class="header-center">
    <div class="overall-progress-block">
      <div>
        <div class="overall-pct" id="overallPct">0<span>%</span></div>
        <div class="overall-bar-wrap"><div class="overall-bar-fill" id="overallBar" style="width:0%"></div></div>
        <div class="overall-label">OVERALL PROGRESS</div>
      </div>
    </div>
    <div class="stat-pills">
      <div class="stat-pill">
        <div class="dot" style="background:#6366f1"></div>
        <span>総数</span><span class="num" id="statTotal">0</span>
      </div>
      <div class="stat-pill">
        <div class="dot" style="background:#059669"></div>
        <span>完了</span><span class="num" id="statDone">0</span>
      </div>
      <div class="stat-pill">
        <div class="dot" style="background:#6b7280"></div>
        <span>残り</span><span class="num" id="statRemain">0</span>
      </div>
    </div>
  </div>

  <div class="header-right no-print">
    <div class="header-date" id="headerDate"></div>
    <button class="hdr-btn reset" onclick="clearAll()">リセット</button>
    <button class="hdr-btn print" onclick="window.print()">🖨 印刷</button>
  </div>
</div>

<!-- Task List -->
<div class="main-content">
  <div class="task-list" id="taskList"></div>
</div>

<!-- Fixed Bottom Add Task -->
<div class="add-task-fixed no-print">
  <div class="add-task-inner">
    <input class="add-task-input" placeholder="タスクを追加..." id="addInput" onkeydown="handleAddKey(event)">
    <select class="add-task-priority" id="addPrio">
      <option value="high">高優先</option>
      <option value="mid" selected>中優先</option>
      <option value="low">低優先</option>
    </select>
    <button class="add-task-btn" onclick="addTask()">＋ タスク追加</button>
  </div>
</div>

<script>
function t() { return '_' + Math.random().toString(36).slice(2,9); }
function today() { return new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-'); }
function save() { localStorage.setItem('epressTasks', JSON.stringify(tasks)); }
function clearAll() { if(confirm('全データをリセットしますか？')) { tasks=[]; save(); render(); } }

let tasks = JSON.parse(localStorage.getItem('epressTasks') || 'null') || [
  { id:t(), name:'ステークホルダーへのヒアリング', priority:'high', done:false, doneDate:null,
    subtasks:[
      { id:t(), name:'部長へのヒアリング', done:false, doneDate:null },
      { id:t(), name:'現場担当者ヒアリング', done:false, doneDate:null },
    ], subOpen:true },
  { id:t(), name:'KPI指標の策定', priority:'mid', done:false, doneDate:null, subtasks:[], subOpen:false },
  { id:t(), name:'システム要件定義書の作成', priority:'high', done:false, doneDate:null,
    subtasks:[
      { id:t(), name:'機能要件リストアップ', done:true, doneDate:today() },
      { id:t(), name:'非機能要件の確認', done:false, doneDate:null },
      { id:t(), name:'レビュー実施', done:false, doneDate:null },
    ], subOpen:true },
];

function render() {
  const total = tasks.length;
  const allSubs = tasks.flatMap(tk => tk.subtasks);
  const totalItems = total + allSubs.length;
  const doneItems = tasks.filter(tk=>tk.done).length + allSubs.filter(s=>s.done).length;
  const pct = totalItems === 0 ? 0 : Math.round(doneItems / totalItems * 100);

  document.getElementById('overallPct').innerHTML = pct + '<span>%</span>';
  document.getElementById('overallBar').style.width = pct + '%';
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = tasks.filter(tk=>tk.done).length;
  document.getElementById('statRemain').textContent = tasks.filter(tk=>!tk.done).length;
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  const list = document.getElementById('taskList');
  list.innerHTML = '';
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty-state">タスクがありません。下のバーからタスクを追加してください。</div>';
    return;
  }
  tasks.forEach(task => list.appendChild(createTaskEl(task)));
}

function createTaskEl(task) {
  const card = document.createElement('div');
  card.className = 'task-card' + (task.done ? ' done' : '');
  card.dataset.id = task.id;

  const subTotal = task.subtasks.length;
  const subDone = task.subtasks.filter(s=>s.done).length;
  const subPct = subTotal === 0 ? (task.done ? 100 : 0) : Math.round(subDone / subTotal * 100);
  const prioClass = {high:'p-high',mid:'p-mid',low:'p-low'}[task.priority] || 'p-mid';
  const prioLabel = {high:'高',mid:'中',low:'低'}[task.priority];
  const mainId = 'cb-' + task.id;

  card.innerHTML = `
    <div class="task-main">
      <div class="cb-wrap">
        <input type="checkbox" id="${mainId}" ${task.done?'checked':''} onchange="toggleTask('${task.id}')">
        <label class="cb-label" for="${mainId}"></label>
      </div>
      <div class="task-info">
        <div class="task-name ${task.done?'done-text':''}">${esc(task.name)}</div>
        <div class="task-meta">
          <span class="priority-badge ${prioClass}">${prioLabel}優先</span>
          ${task.doneDate ? `<span class="check-date">✓ ${task.doneDate}</span>` : ''}
          ${subTotal > 0 ? `<button class="toggle-sub ${task.subOpen?'open':''}" onclick="toggleSub('${task.id}')"><span class="arrow">▶</span> ${subDone}/${subTotal}</button>` : ''}
        </div>
        ${subTotal > 0 ? `
        <div class="task-progress-mini">
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${subPct}%;background:${subPct===100?'var(--done)':subPct>0?'var(--warn)':'var(--border)'}"></div></div>
          <div class="mini-pct">${subPct}%</div>
        </div>` : ''}
      </div>
      <div class="task-actions no-print">
        <button class="del-btn" onclick="deleteTask('${task.id}')">✕</button>
      </div>
    </div>
    <div class="subtask-list ${task.subOpen?'open':''}" id="sub-${task.id}">
      ${task.subtasks.map(s => subtaskHTML(task.id, s)).join('')}
      <div class="add-sub-form no-print">
        <input class="add-sub-input" placeholder="サブタスクを追加..." id="subinput-${task.id}" onkeydown="handleSubKey(event,'${task.id}')">
        <button class="add-sub-btn" onclick="addSubtask('${task.id}')">＋</button>
      </div>
    </div>
  `;
  return card;
}

function subtaskHTML(taskId, s) {
  const cbId = 'scb-' + s.id;
  return `
    <div class="subtask-item" data-sid="${s.id}">
      <div class="cb-wrap">
        <input type="checkbox" id="${cbId}" ${s.done?'checked':''} onchange="toggleSub2('${taskId}','${s.id}')">
        <label class="cb-label" for="${cbId}"></label>
      </div>
      <div class="subtask-name ${s.done?'done-text':''}">${esc(s.name)}</div>
      ${s.doneDate ? `<span class="sub-date">✓ ${s.doneDate}</span>` : ''}
      <button class="sub-del no-print" onclick="deleteSubtask('${taskId}','${s.id}')">✕</button>
    </div>
  `;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addTask() {
  const inp = document.getElementById('addInput');
  const prio = document.getElementById('addPrio');
  const name = inp.value.trim();
  if (!name) return;
  tasks.push({ id:t(), name, priority:prio.value, done:false, doneDate:null, subtasks:[], subOpen:false });
  inp.value = '';
  save(); render();
  setTimeout(() => document.getElementById('addInput').focus(), 0);
}
function handleAddKey(e) { if (e.key === 'Enter') addTask(); }

function toggleTask(id) {
  const task = tasks.find(tk=>tk.id===id);
  if (!task) return;
  task.done = !task.done;
  task.doneDate = task.done ? today() : null;
  save(); render();
}

function toggleSub(taskId) {
  const task = tasks.find(tk=>tk.id===taskId);
  if (!task) return;
  task.subOpen = !task.subOpen;
  save(); render();
}

function toggleSub2(taskId, subId) {
  const task = tasks.find(tk=>tk.id===taskId);
  if (!task) return;
  const sub = task.subtasks.find(s=>s.id===subId);
  if (!sub) return;
  sub.done = !sub.done;
  sub.doneDate = sub.done ? today() : null;
  if (task.subtasks.length > 0 && task.subtasks.every(s=>s.done)) {
    task.done = true; task.doneDate = today();
  } else if (task.done && !task.subtasks.every(s=>s.done)) {
    task.done = false; task.doneDate = null;
  }
  save(); render();
}

function addSubtask(taskId) {
  const inp = document.getElementById('subinput-' + taskId);
  const name = inp.value.trim();
  if (!name) return;
  const task = tasks.find(tk=>tk.id===taskId);
  if (!task) return;
  task.subtasks.push({ id:t(), name, done:false, doneDate:null });
  task.subOpen = true;
  save(); render();
  setTimeout(() => { const el = document.getElementById('subinput-'+taskId); if(el) el.focus(); }, 0);
}
function handleSubKey(e, taskId) { if(e.key==='Enter') addSubtask(taskId); }

function deleteTask(id) {
  tasks = tasks.filter(tk=>tk.id!==id);
  save(); render();
}
function deleteSubtask(taskId, subId) {
  const task = tasks.find(tk=>tk.id===taskId);
  if (!task) return;
  task.subtasks = task.subtasks.filter(s=>s.id!==subId);
  save(); render();
}

render();
</script>
</body>
</html>
